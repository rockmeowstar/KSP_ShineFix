SHABBY_MATERIAL_DEF
{
	name = ShineFixROMatteSpecular

	shader = KSP/Specular

	COLOR
	{
		_SpecColor = #000000
	}

	FLOAT
	{
		_Shininess = 0.0
	}
}


SHABBY_MATERIAL_DEF
{
	name = ShineFixROWindowGloss

	shader = KSP/Emissive/Specular

	COLOR
	{
		_SpecColor = #e7e7e7
	}

	FLOAT
	{
		_Shininess = 0.75
	}
}


@PART[TinyTim]:FINAL:NEEDS[RealismOverhaul,TextureReplacer,!TexturesUnlimited]
{
	!MODULE[TRReflection],* {}

	!SHABBY_MATERIAL_REPLACE,* {}

	SHABBY_MATERIAL_REPLACE
	{
		materialDef = ShineFixROMatteSpecular
		targetMaterial = booster
	}

	SHABBY_MATERIAL_REPLACE
	{
		materialDef = ShineFixROMatteSpecular
		targetMaterial = bands
	}
}


@PART[ROAerojet25KS18000|ROAerojet18KS7800]:FINAL:NEEDS[RealismOverhaul,000_ShineFix]
{
	!SHABBY_MATERIAL_REPLACE,* {}
}


@KSP_TEXTURE_SET[RO-TinyTim]:FINAL:NEEDS[RealismOverhaul,TexturesUnlimited]
{
	@MATERIAL
	{
		@PROPERTY:HAS[#name[_Metal]]
		{
			@float = 0.0
		}

		@PROPERTY:HAS[#name[_Smoothness]]
		{
			@float = 0.08
		}
	}
}

@PART[RO-X1Cockpit]:FINAL:NEEDS[RealismOverhaul,000_ShineFix]
{

	@MODEL
	{
		%texture = x1cockpittex,000_ShineFix/2_CompatibilityFixes/x1cockpittex
	}

	!SHABBY_MATERIAL_REPLACE,* {}

	SHABBY_MATERIAL_REPLACE
	{
		materialDef = ReStockPlainGlossPatch
		targetMaterial = x1cockpituv.003
	}

	SHABBY_MATERIAL_REPLACE
	{
		materialDef = ShineFixNoGlossPatch
		targetMaterial = material_001.003
	
}
